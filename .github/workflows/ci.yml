name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
      - run: npm ci
      - run: npm run build

  test:
    name: Test
    runs-on: ubuntu-latest
    if: false  # Disabled until tests are added
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
      - run: npm ci
      - run: npm test

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [lint, build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
      
      - name: Add server to known hosts
        run: |
          ssh-keyscan -p ${{ secrets.SSH_PORT || 22 }} ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts
      
      - name: Deploy to server
        run: |
          ssh -p ${{ secrets.SSH_PORT || 22 }} ${{ secrets.SSH_USER || 'root' }}@${{ secrets.SERVER_IP }} << 'EOF'
            set -e
            DEPLOY_PATH="/var/www/cardxc"
            REMOTE_REPO="git@github.com:whogf22/cardxc-online.git"
            
            echo "🚀 Starting deployment..."
            
            # Setup directory
            mkdir -p $DEPLOY_PATH
            cd $DEPLOY_PATH
            
            # Git operations
            git init || true
            git remote remove origin 2>/dev/null || true
            git remote add origin $REMOTE_REPO || git remote set-url origin $REMOTE_REPO
            git fetch origin
            git checkout main || git checkout -b main
            git pull origin main
            
            # Install and build
            echo "📦 Installing dependencies..."
            npm install --production=false
            
            echo "🔨 Building application..."
            npm run build
            
            # Restart services
            echo "🔄 Restarting services..."
            pm2 restart all || echo "PM2 restart skipped"
            systemctl restart nginx || service nginx restart || echo "Nginx restart skipped"
            
            echo "✅ Deployment completed!"
          EOF
