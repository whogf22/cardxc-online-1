    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='40' fill='%2384cc16'/%3E%3Ctext x='50%25' y='55%25' text-anchor='middle' dominant-baseline='middle' font-family='system-ui' font-weight='700' font-size='72' fill='%23000'%3ECX%3C/text%3E%3C/svg%3E" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Content Security Policy (first line of defence; edge/Cloudflare should
         also emit a matching response header). 'unsafe-inline' on style-src
         is required for Vite-injected styles and for the inline <style> below;
         'unsafe-inline' on script-src is kept only for JSON-LD <script> blocks
         and inline onload handlers. Tighten at the edge with a per-request
         nonce once the CDN layer supports it. -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://api.fontshare.com https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; img-src 'self' data: https:; font-src 'self' data: https://api.fontshare.com https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; connect-src 'self' https://api.cardxc.online https://*.supabase.co wss://*.supabase.co; frame-src 'self' https://js.stripe.com https://checkout.stripe.com; object-src 'none'; base-uri 'self'; form-action 'self';" />

    <!-- Primary Meta Tags -->
    <title>CardXC — Send Money Worldwide & Buy Gift Cards</title>
    <meta name="title" content="CardXC — Send Money Worldwide & Buy Gift Cards" />
    <meta name="description" content="CardXC is the premium fintech platform for virtual payment cards. Bank-level security, instant global payments, real-time rates, and 24/7 support. Manage your digital spending with VISA and Mastercard." />

    <!-- DNS Prefetch for CDN domains -->
    <link rel="dns-prefetch" href="https://cdnjs.cloudflare.com">
    <link rel="dns-prefetch" href="https://api.fontshare.com">

    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://api.fontshare.com" crossorigin>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>

    <!-- Fonts - Satoshi (async, non-render-blocking).
         NOTE: api.fontshare.com serves a dynamic CSS that references woff2
         files with rotating URLs, so SRI is infeasible against the CSS
         endpoint itself. The CSP style-src directive above restricts the
         allowed origin; self-hosting the font remains the stronger long-term
         fix. -->
    <link rel="preload" href="https://api.fontshare.com/v2/css?f[]=satoshi@300,400,500,600,700,900&display=swap" as="style" crossorigin="anonymous" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link href="https://api.fontshare.com/v2/css?f[]=satoshi@300,400,500,600,700,900&display=swap" rel="stylesheet" crossorigin="anonymous"></noscript>

    <!-- Font display fallback to prevent FOIT -->
    <style>
      body, * { font-display: swap; }
      .font-satoshi, h1, h2, h3, h4, h5, h6 { font-family: 'Satoshi', system-ui, -apple-system, sans-serif; }
    </style>

    <!-- Icons (async, non-render-blocking).
         TODO(sri): generate and pin sha384 integrity hashes for the two
         pinned CDN CSS files below, e.g.:
           curl -sSL <url> | openssl dgst -sha384 -binary | openssl base64 -A
         Then add integrity="sha384-…" to each <link>. Hashes must be refreshed
         any time the pinned version changes. Self-hosting is the stronger
         long-term fix for a fintech app. crossorigin="anonymous" is added
         today so that adding integrity= later does not break loading. -->
    <link rel="preload" href="https://cdn.jsdelivr.net/npm/remixicon@4.6.0/fonts/remixicon.css" as="style" crossorigin="anonymous" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link href="https://cdn.jsdelivr.net/npm/remixicon@4.6.0/fonts/remixicon.css" rel="stylesheet" crossorigin="anonymous" /></noscript>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" media="print" crossorigin="anonymous" onload="this.media='all'" />
    <noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" /></noscript>

            "text": "CardXC charges a transparent fee on each transfer—typically lower than traditional banks. Use our Fee Calculator to see the exact amount you pay and what your recipient gets before you send."
          }
        },
        {
          "@type": "Question",
          "name": "How fast are transfers?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Most transfers complete within minutes. Same-day delivery is available to many countries. You can track status in your account."
          }
        },
        {
          "@type": "Question",
          "name": "Is my money secure?",
          "acceptedAnswer": {

          }
